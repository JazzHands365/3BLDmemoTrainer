<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3x3 Memo Trainer</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0c0f;
    --surface: #111418;
    --surface2: #181c22;
    --border: #1e2530;
    --accent: #00e5ff;
    --accent2: #ff6b35;
    --accent3: #7fff6b;
    --text: #d0dce8;
    --text-dim: #4a5568;
    --text-muted: #2a3344;
    --success: #7fff6b;
    --error: #ff4560;
    --pair-gap: 0.55em;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
    overflow-x: hidden;
  }

  /* Subtle grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .wrapper {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 820px;
    display: flex;
    flex-direction: column;
    gap: 2rem;
  }

  /* Header */
  header {
    text-align: center;
  }

  .title {
    font-family: 'Orbitron', sans-serif;
    font-weight: 900;
    font-size: clamp(1.4rem, 4vw, 2.2rem);
    letter-spacing: 0.18em;
    color: var(--accent);
    text-shadow: 0 0 20px rgba(0,229,255,0.4), 0 0 60px rgba(0,229,255,0.15);
    text-transform: uppercase;
  }

  .subtitle {
    font-size: 0.75rem;
    letter-spacing: 0.3em;
    color: var(--text-dim);
    margin-top: 0.4rem;
    text-transform: uppercase;
  }

  /* Main display card */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 2rem 2.5rem;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity: 0.6;
  }

  .row-label {
    font-size: 0.65rem;
    letter-spacing: 0.35em;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-bottom: 0.5rem;
  }

  .letter-row {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 0.2rem var(--pair-gap);
    min-height: 3.2rem;
    margin-bottom: 0.4rem;
  }

  .pair {
    display: inline-flex;
    gap: 0;
    font-family: 'Orbitron', sans-serif;
    font-weight: 700;
    font-size: clamp(1.5rem, 3.5vw, 2.2rem);
    letter-spacing: 0.06em;
    color: var(--text);
    transition: color 0.2s;
  }

  .pair .letter {
    display: inline-block;
    transition: all 0.15s;
  }

  .pair .letter:hover {
    color: var(--accent);
  }

  .singleton {
    font-family: 'Orbitron', sans-serif;
    font-weight: 700;
    font-size: clamp(1.5rem, 3.5vw, 2.2rem);
    color: var(--accent2);
    letter-spacing: 0.06em;
    margin-left: 0.15em;
    transition: all 0.15s;
  }

  .row-divider {
    height: 1px;
    background: var(--border);
    margin: 1.2rem 0;
  }

  .row-meta {
    font-size: 0.65rem;
    color: var(--text-dim);
    letter-spacing: 0.2em;
    margin-top: 0.3rem;
  }

  /* Hidden state */
  .letter-row.hidden .pair,
  .letter-row.hidden .singleton {
    color: transparent;
    text-shadow: none;
    background: var(--text-muted);
    border-radius: 2px;
    user-select: none;
  }

  .letter-row.hidden .pair {
    min-width: 2.6ch;
  }

  /* Controls */
  .controls {
    display: flex;
    gap: 0.75rem;
    flex-wrap: wrap;
    justify-content: center;
  }

  .btn {
    font-family: 'Orbitron', sans-serif;
    font-weight: 700;
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    border: 1px solid;
    border-radius: 3px;
    padding: 0.7rem 1.6rem;
    cursor: pointer;
    transition: all 0.15s ease;
    background: transparent;
    position: relative;
    overflow: hidden;
  }

  .btn::after {
    content: '';
    position: absolute;
    inset: 0;
    background: currentColor;
    opacity: 0;
    transition: opacity 0.15s;
  }

  .btn:hover::after { opacity: 0.07; }
  .btn:active::after { opacity: 0.15; }

  .btn-hide {
    color: var(--accent);
    border-color: var(--accent);
  }

  .btn-hide:hover {
    box-shadow: 0 0 14px rgba(0,229,255,0.25);
  }

  .btn-new {
    color: var(--accent2);
    border-color: var(--accent2);
  }

  .btn-new:hover {
    box-shadow: 0 0 14px rgba(255,107,53,0.25);
  }

  .btn-check {
    color: var(--accent3);
    border-color: var(--accent3);
  }

  .btn-check:hover {
    box-shadow: 0 0 14px rgba(127,255,107,0.25);
  }

  /* Answer section */
  .answer-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1.5rem 2rem;
    position: relative;
  }

  .answer-section::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent3), transparent);
    opacity: 0.5;
  }

  .answer-label {
    font-size: 0.65rem;
    letter-spacing: 0.35em;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-bottom: 0.8rem;
  }

  .answer-hint {
    font-size: 0.6rem;
    color: var(--text-muted);
    letter-spacing: 0.15em;
    margin-bottom: 0.8rem;
  }

  .answer-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 3px;
    color: var(--text);
    font-family: 'Orbitron', sans-serif;
    font-weight: 700;
    font-size: clamp(1rem, 2.5vw, 1.4rem);
    letter-spacing: 0.12em;
    padding: 0.9rem 1rem;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    text-transform: uppercase;
  }

  .answer-input:focus {
    border-color: var(--accent3);
    box-shadow: 0 0 0 2px rgba(127,255,107,0.08);
  }

  .answer-input::placeholder {
    color: var(--text-muted);
    font-size: 0.75rem;
    letter-spacing: 0.1em;
  }

  /* Feedback */
  .feedback {
    margin-top: 1rem;
    font-size: 0.75rem;
    letter-spacing: 0.12em;
    min-height: 1.5rem;
    transition: all 0.2s;
  }

  .feedback.success {
    color: var(--success);
  }

  .feedback.error {
    color: var(--error);
  }

  .feedback-detail {
    margin-top: 0.6rem;
    display: flex;
    flex-direction: column;
    gap: 0.3rem;
  }

  .feedback-row {
    display: flex;
    align-items: flex-start;
    gap: 0.8rem;
    font-size: 0.7rem;
  }

  .feedback-row-label {
    color: var(--text-dim);
    min-width: 4ch;
    letter-spacing: 0.1em;
  }

  .feedback-chars {
    display: flex;
    flex-wrap: wrap;
    gap: 0.15rem;
    font-family: 'Orbitron', sans-serif;
    font-size: 0.8rem;
  }

  .char-match { color: var(--success); }
  .char-miss  { color: var(--error); background: rgba(255,69,96,0.12); border-radius: 2px; padding: 0 2px; }
  .char-extra { color: var(--accent2); background: rgba(255,107,53,0.12); border-radius: 2px; padding: 0 2px; }

  /* Scan line flash on new generation */
  @keyframes scanFlash {
    0%   { transform: translateY(-100%); opacity: 0.5; }
    100% { transform: translateY(100vh); opacity: 0; }
  }

  .scan-flash {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    pointer-events: none;
    z-index: 999;
    animation: scanFlash 0.5s ease-out forwards;
  }

  /* Pulse on reveal */
  @keyframes revealPulse {
    0%   { opacity: 0; transform: scale(0.95); }
    100% { opacity: 1; transform: scale(1); }
  }

  .letter-row .pair,
  .letter-row .singleton {
    animation: revealPulse 0.25s ease-out both;
  }

  .letter-row .pair:nth-child(1) { animation-delay: 0s; }
  .letter-row .pair:nth-child(2) { animation-delay: 0.03s; }
  .letter-row .pair:nth-child(3) { animation-delay: 0.06s; }
  .letter-row .pair:nth-child(4) { animation-delay: 0.09s; }
  .letter-row .pair:nth-child(5) { animation-delay: 0.12s; }
  .letter-row .pair:nth-child(6) { animation-delay: 0.15s; }
  .letter-row .pair:nth-child(7) { animation-delay: 0.18s; }

  footer {
    text-align: center;
    font-size: 0.6rem;
    letter-spacing: 0.25em;
    color: var(--text-muted);
    text-transform: uppercase;
  }
</style>
</head>
<body>

<div class="wrapper">

  <header>
    <div class="title">3×3 Memo Trainer</div>
    <div class="subtitle">Blind Solving Memory Aid · A–X Alphabet</div>
  </header>

  <!-- Letter display card -->
  <div class="card" id="displayCard">
    <div class="row-label">Row 1</div>
    <div class="letter-row" id="row1"></div>
    <div class="row-meta" id="meta1"></div>
    <div class="row-divider"></div>
    <div class="row-label">Row 2</div>
    <div class="letter-row" id="row2"></div>
    <div class="row-meta" id="meta2"></div>
  </div>

  <!-- Controls -->
  <div class="controls">
    <button class="btn btn-hide" id="btnHide" onclick="toggleHide()">Hide</button>
    <button class="btn btn-new" onclick="generateNew()">New Set</button>
    <button class="btn btn-check" onclick="checkAnswer()">Check</button>
  </div>

  <!-- Answer section -->
  <div class="answer-section">
    <div class="answer-label">Your Answer</div>
    <div class="answer-hint">Type the full sequence — pairs separated by spaces (e.g. AB CD EF GH IJ KL M UV WX YZ AB CD)</div>
    <input
      class="answer-input"
      id="answerInput"
      type="text"
      placeholder="Type your memorised sequence here..."
      autocomplete="off"
      spellcheck="false"
      onkeydown="if(event.key==='Enter') checkAnswer()"
    />
    <div class="feedback" id="feedback"></div>
    <div class="feedback-detail" id="feedbackDetail"></div>
  </div>

  <footer>Practice makes permanent</footer>

</div>

<script>
  const LETTERS = 'ABCDEFGHIJKLMNOPQRSTUVWX';

  let currentSequence = [];
  let isHidden = false;

  function randLetter() {
    return LETTERS[Math.floor(Math.random() * LETTERS.length)];
  }

  function generateSequence(count) {
    const seq = [];
    for (let i = 0; i < count; i++) {
      let letter;
      do {
        letter = randLetter();
      } while (seq.length > 0 && letter === seq[seq.length - 1]);
      seq.push(letter);
    }
    return seq;
  }

  function generateNew() {
    // Row 1: 12 or 13 letters (random)
    const row1Even = Math.random() < 0.5;
    const row1Count = row1Even ? 12 : 13;
    // Row 2 mirrors parity
    const row2Count = row1Even ? 10 : 9;

    const row1 = generateSequence(row1Count);
    const row2 = generateSequence(row2Count);
    currentSequence = [...row1, ...row2];

    renderRow('row1', row1, 'meta1');
    renderRow('row2', row2, 'meta2');

    // Reset state
    setHidden(false);
    document.getElementById('answerInput').value = '';
    document.getElementById('feedback').className = 'feedback';
    document.getElementById('feedback').textContent = '';
    document.getElementById('feedbackDetail').innerHTML = '';

    // Scan flash effect
    const flash = document.createElement('div');
    flash.className = 'scan-flash';
    document.body.appendChild(flash);
    setTimeout(() => flash.remove(), 600);
  }

  function renderRow(rowId, letters, metaId) {
    const el = document.getElementById(rowId);
    el.innerHTML = '';

    const pairCount = Math.floor(letters.length / 2);
    const hasSingleton = letters.length % 2 === 1;

    for (let i = 0; i < pairCount; i++) {
      const span = document.createElement('span');
      span.className = 'pair';
      span.innerHTML =
        `<span class="letter">${letters[i*2]}</span><span class="letter">${letters[i*2+1]}</span>`;
      el.appendChild(span);
    }

    if (hasSingleton) {
      const single = document.createElement('span');
      single.className = 'singleton';
      single.textContent = letters[letters.length - 1];
      el.appendChild(single);
    }

    const metaPairs = `${pairCount} pair${pairCount !== 1 ? 's' : ''}`;
    const metaSingle = hasSingleton ? ' + 1' : '';
    document.getElementById(metaId).textContent =
      `${letters.length} letters · ${metaPairs}${metaSingle}`;
  }

  function setHidden(hidden) {
    isHidden = hidden;
    const r1 = document.getElementById('row1');
    const r2 = document.getElementById('row2');
    const btn = document.getElementById('btnHide');

    if (hidden) {
      r1.classList.add('hidden');
      r2.classList.add('hidden');
      btn.textContent = 'Reveal';
    } else {
      r1.classList.remove('hidden');
      r2.classList.remove('hidden');
      btn.textContent = 'Hide';
    }
  }

  function toggleHide() {
    setHidden(!isHidden);
  }

  function checkAnswer() {
    const fb = document.getElementById('feedback');
    const detail = document.getElementById('feedbackDetail');
    const raw = document.getElementById('answerInput').value.trim().toUpperCase();

    if (!currentSequence.length) {
      fb.className = 'feedback error';
      fb.textContent = '⚠ Generate a set first.';
      detail.innerHTML = '';
      return;
    }

    // Parse user input: strip spaces, get just letters
    const userLetters = raw.replace(/\s/g, '').split('');
    const correct = currentSequence;

    const allMatch = userLetters.length === correct.length &&
      userLetters.every((l, i) => l === correct[i]);

    detail.innerHTML = '';

    if (allMatch) {
      fb.className = 'feedback success';
      fb.textContent = '✓ Perfect — sequence correct!';
    } else {
      fb.className = 'feedback error';
      const diff = Math.abs(userLetters.length - correct.length);
      const wrongCount = correct.reduce((acc, l, i) =>
        acc + (userLetters[i] !== l ? 1 : 0), 0);
      fb.textContent = `✗ Not quite — ${wrongCount} position${wrongCount !== 1 ? 's' : ''} off${diff ? `, length diff: ${diff}` : ''}.`;

      // Show comparison
      detail.innerHTML = '';

      const correctRow = buildCompareRow('Correct', correct, userLetters, true);
      const yoursRow   = buildCompareRow('Yours',   userLetters, correct, false);
      detail.appendChild(correctRow);
      detail.appendChild(yoursRow);
    }
  }

  function buildCompareRow(label, source, ref, isCorrect) {
    const row = document.createElement('div');
    row.className = 'feedback-row';

    const lbl = document.createElement('span');
    lbl.className = 'feedback-row-label';
    lbl.textContent = label;
    row.appendChild(lbl);

    const chars = document.createElement('span');
    chars.className = 'feedback-chars';

    source.forEach((letter, i) => {
      const span = document.createElement('span');
      const refLetter = ref[i];

      if (isCorrect) {
        span.className = refLetter === letter ? 'char-match' : 'char-miss';
      } else {
        const correctLetter = ref[i]; // ref is the correct sequence when isCorrect=false
        if (i >= ref.length) {
          span.className = 'char-extra';
        } else {
          span.className = correctLetter === letter ? 'char-match' : 'char-miss';
        }
      }

      span.textContent = letter;
      // Add visual pair spacing every 2 chars based on position
      if (i > 0 && i % 2 === 0) {
        const spacer = document.createElement('span');
        spacer.style.display = 'inline-block';
        spacer.style.width = '0.4em';
        chars.appendChild(spacer);
      }
      chars.appendChild(span);
    });

    row.appendChild(chars);
    return row;
  }

  // Init on load
  generateNew();
</script>

</body>
</html>
